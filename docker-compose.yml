version: '3.8'

services:
  virtuadoc:
    build:
      context: .
      dockerfile: Dockerfile
    image: virtuadoc-app:latest
    networks:
      - typebotnet
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.virtuadoc.rule=Host(`virtuadoc.automatech.tech`)
        - traefik.http.routers.virtuadoc.entrypoints=websecure
        - traefik.http.routers.virtuadoc.tls.certresolver=letsencryptresolver
        - traefik.http.routers.virtuadoc.service=virtuadoc
        - traefik.http.services.virtuadoc.loadbalancer.server.port=3000
        - traefik.http.services.virtuadoc.loadbalancer.passHostHeader=1

networks:
  typebotnet:
    external: true
    name: typebotnet
