      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.virtuadoc.rule=Host(`virtuadoc.automatech.tech`)
        - traefik.http.routers.virtuadoc.entrypoints=websecure
        - traefik.http.routers.virtuadoc.tls.certresolver=letsencryptresolver
        - traefik.http.routers.virtuadoc.service=virtuadoc
        - traefik.http.services.virtuadoc.loadbalancer.server.port=3000
        - traefik.http.services.virtuadoc.loadbalancer.passHostHeader=1

networks:
  typebotnet:
