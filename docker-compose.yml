version: '3.8'

services:
  virtuadoc:
    build:
      context: .
      dockerfile: Dockerfile
    image: virtuadoc-app:latest
    networks:
      - typebotnet
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - MERCADO_PAGO_ACCESS_TOKEN=${MERCADO_PAGO_ACCESS_TOKEN}
      - NEXT_PUBLIC_MP_PUBLIC_KEY=${NEXT_PUBLIC_MP_PUBLIC_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.virtuadoc.rule=Host(`virtuadoc.automatech.tech`)
        - traefik.http.routers.virtuadoc.entrypoints=websecure
        - traefik.http.routers.virtuadoc.tls.certresolver=letsencryptresolver
        - traefik.http.routers.virtuadoc.service=virtuadoc
        - traefik.http.services.virtuadoc.loadbalancer.server.port=3000
        - traefik.http.services.virtuadoc.loadbalancer.passHostHeader=1

networks:
  typebotnet:
    external: true
    name: typebotnet
